<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moda Language Solutions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Moda Language Solutions</h1>
    <p>Professional Translation Services</p>
  </header>

  <section class="profile">
    <h2>About Us</h2>
    <p>
      We provide accurate and professional translation services for businesses
      and individuals worldwide.
    </p>
  </section>

  <section class="contact">
    <h2>Request a Translation</h2>

    <form action="https://api.web3forms.com/submit" method="POST">

      <!-- Web3Forms Access Key -->
      <input type="hidden" name="access_key" value="aa9cd492-a4d0-45b2-a949-5c212130c157">

      <!-- Optional -->
      <input type="hidden" name="subject" value="New Translation Request - Moda Language Solutions">

      <label>Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Language Pair</label>
      <input type="text" name="language" placeholder="e.g. English to Spanish" required>

      <label>Message</label>
      <textarea name="message"></textarea>

      <input type="file" name="file">

      <button type="submit">Submit Request</button>

    </form>

  </section>

</body>
</html>
